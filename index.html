<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <script>
    const password = "19.10.2025";

    if (sessionStorage.getItem("authenticated") !== "true") {
      const userPass = prompt("Enter password to access the site:");
      if (userPass === password) {
        sessionStorage.setItem("authenticated", "true");
      } else {
        alert("Wrong password! Access denied.");
        window.location.href = "https://www.google.com";
      }
    }
  </script>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      padding: 20px; 
      background: #f7f7f7; 
      color: #333; 
    }

    h1 { 
      text-align: center; 
      margin-bottom: 30px; 
    }

    .book { 
      margin: 20px 0; 
      padding: 15px; 
      background: #fff; 
      border-radius: 10px; 
      box-shadow: 0 0 5px #ccc; 
      cursor: pointer; 
    }

    .book:hover { 
      background-color: #f0f0f0; 
    }

    .book h2 { 
      margin: 0; 
    }

    .chapter-list { 
      display: none; 
      margin-top: 10px; 
    }

    .chapter { 
      margin: 10px 0; 
    }

    audio { 
      width: 100%; 
      max-width: 600px; 
      display: block; 
      margin-bottom: 5px; 
    }

    a { 
      text-decoration: none; 
      color: #007BFF; 
    }

    a:hover { 
      text-decoration: underline; 
    }

    /* NEW BOOK CARD STYLE */

    .book-header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .book-cover {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
    }

  </style>
</head>
<body>

  <h1>For You ❤️</h1>
  <p>Stories I’m recording just for you.</p>

  <!-- Audiobook -->
  <div class="book" onclick="toggleChapters('book1')">

    <div class="book-header">
      <img src="images/book1.jpg" class="book-cover">

      <div>
        <h2>Audiobook One</h2>
        <p>A special story recorded just for you.</p>
      </div>
    </div>

    <div class="chapter-list" id="book1">

      <div class="chapter">
        <h3>Chapter 1</h3>
        <audio controls>
          <source src="audio/chapter-1.mp3" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <a href="audio/chapter-1.mp3" download>Download Chapter 1</a>
      </div>

      <div class="chapter">
        <h3>Chapter 2</h3>
        <audio controls>
          <source src="audio/chapter-2.mp3" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <a href="audio/chapter-2.mp3" download>Download Chapter 2</a>
      </div>

    </div>
  </div>

  <script>
    function toggleChapters(bookId) {
      const chapters = document.getElementById(bookId);
      if (chapters.style.display === "block") {
        chapters.style.display = "none";
      } else {
        chapters.style.display = "block";
      }
    }
  </script>

</body>
</html>
