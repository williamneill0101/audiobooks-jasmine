<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script>
const password = "19.10.2025";

if (sessionStorage.getItem("authenticated") !== "true") {

const userPass = prompt("Enter password to access the site:");

if (userPass === password) {
sessionStorage.setItem("authenticated","true");
} else {
alert("Wrong password! Access denied.");
window.location.href="https://www.google.com";
}

}
</script>

<style>

body{
font-family:'Poppins',sans-serif;
padding:20px;
background:linear-gradient(135deg,#f5f7fa,#e4e8f0);
color:#333;
text-align:center;
}

h1{
margin-bottom:10px;
}

p{
margin-bottom:30px;
}

.book{
margin:20px auto;
padding:20px;
background:#fff;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
cursor:pointer;
max-width:600px;
text-align:left;
}

.book:hover{
background-color:#f4f4f4;
}

.book-header{
display:flex;
align-items:center;
gap:15px;
}

.book-cover{
width:100px;
height:auto;
border-radius:6px;
}

.chapter-list{
display:none;
margin-top:15px;
}

.chapter{
margin:15px 0;
}

audio{
width:100%;
max-width:500px;
display:block;
margin-bottom:5px;
}

/* PLAY ALL BUTTON */

button{
background:#e75480;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#d9436f;
}

a{
text-decoration:none;
color:#e75480;
font-size:14px;
}

a:hover{
text-decoration:underline;
}

/* MOBILE IMPROVEMENTS */

@media (max-width:600px){

body{
padding:15px;
}

.book{
padding:15px;
}

.book-header{
flex-direction:column;
align-items:center;
text-align:center;
}

.book-cover{
width:140px;
height:auto;
}

audio{
max-width:100%;
}

}

</style>

</head>

<body>

<h1>For You ❤️</h1>
<p>Stories I’m recording just for you.</p>

<div class="book" onclick="toggleChapters('book1')">

<div class="book-header">

<img src="images/book1.jpg" class="book-cover">

<div>
<h2>Audiobook One</h2>
<p>A special story recorded just for you.</p>
</div>

</div>

<button onclick="playAll()">▶ Play All Chapters</button>

<div class="chapter-list" id="book1">

<div class="chapter">

<h3>Chapter 1</h3>

<audio controls>
<source src="audio/chapter-1.mp3" type="audio/mpeg">
</audio>

<a href="audio/chapter-1.mp3" download>
Download Chapter 1
</a>

</div>

<div class="chapter">

<h3>Chapter 2</h3>

<audio controls>
<source src="audio/chapter-2.mp3" type="audio/mpeg">
</audio>

<a href="audio/chapter-2.mp3" download>
Download Chapter 2
</a>

</div>

</div>

</div>

<script>

function toggleChapters(bookId){

const chapters=document.getElementById(bookId);

if(chapters.style.display==="block"){
chapters.style.display="none";
}else{
chapters.style.display="block";
}

}

/* PLAY ALL CHAPTERS */

function playAll(){

const audios=document.querySelectorAll("audio");

let current=0;

audios[current].play();

audios.forEach((audio,index)=>{

audio.onended=function(){

if(index+1<audios.length){

audios[index+1].play();

}

}

});

}

/* CONTINUE LISTENING */

document.querySelectorAll("audio").forEach((audio,index)=>{

const savedTime=localStorage.getItem("audio-"+index);

if(savedTime){
audio.currentTime=savedTime;
}

audio.addEventListener("timeupdate",()=>{

localStorage.setItem("audio-"+index,audio.currentTime);

});

});

</script>

</body>
</html>
